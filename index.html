
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Harry Potter Magic Card</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            background: radial-gradient(circle, #1a0033, #000);
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
            font-family: 'Georgia', serif;
        }
        .card {
            background: linear-gradient(135deg, #111, #222);
            width: 300px;
            height: 450px;
            border-radius: 20px;
            box-shadow: 0 0 30px rgba(142, 68, 173, 0.6);
            border: 3px solid #ffd700;
            text-align: center;
            padding: 20px;
            color: #fff;
            transition: transform 0.5s ease, box-shadow 0.5s ease;
            cursor: pointer;
        }
        .card:hover {
            transform: scale(1.05) rotateY(10deg);
            box-shadow: 0 0 50px #ffd700;
        }
        .crest {
            font-size: 70px;
            margin-top: 40px;
            animation: float 3s ease-in-out infinite;
        }
        h1 {
            color: #ffd700;
            letter-spacing: 2px;
            font-size: 24px;
            margin-top: 20px;
        }
        p {
            font-size: 14px;
            color: #bbb;
            line-height: 1.6;
        }
        .wand-btn {
            margin-top: 40px;
            background: #ffd700;
            color: #000;
            border: none;
            padding: 10px 20px;
            font-size: 16px;
            font-weight: bold;
            border-radius: 30px;
            cursor: pointer;
            box-shadow: 0 4px 15px rgba(255, 215, 0, 0.4);
        }
        @keyframes float {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-15px); }
        }
    </style>
</head>
<body>

    <div class="card" onclick="castSpell()">
        <div class="crest">⚡</div>
        <h1>HOGWARTS</h1>
        <p>Welcome to the Wizarding World.<br>Tap the card to cast a magical spell!</p>
        <button class="wand-btn">Alohomora!</button>
    </div>

    <script>
        function castSpell() {
            alert("🪄 Expecto Patronum! Magic is in the air!");
        }
    </script>

</body>
</html>

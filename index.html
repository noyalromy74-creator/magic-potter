<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>The Final Duel</title>
    <style>
        body { margin: 0; background: #000; color: #fff; font-family: 'Georgia', serif; text-align: center; overflow: hidden; }
        
        .scene { width: 100vw; height: 100vh; display: flex; flex-direction: column; align-items: center; justify-content: center; position: relative; }
        
        .duel-box { width: 350px; height: 500px; border: 3px solid #ffd700; position: relative; background: radial-gradient(#1a0a2a, #000); overflow: hidden; }
        
        /* Characters */
        .char { position: absolute; font-size: 50px; transition: 1s; }
        #harry { bottom: 20px; left: 50px; }
        #voldy { top: 20px; right: 50px; transform: scaleX(-1); }

        /* Magic Beam */
        .beam { position: absolute; width: 0%; height: 5px; background: #00bfff; bottom: 80px; left: 100px; animation: castBeam 4s infinite; }
        
        /* Death Animation */
        .dust { position: absolute; font-size: 80px; opacity: 0; }
        
        /* Final Title */
        .title { position: absolute; font-size: 20px; color: #ffd700; opacity: 0; animation: showTitle 8s forwards; }

        @keyframes castBeam { 0% {width: 0%;} 50% {width: 200px; box-shadow: 0 0 20px #00bfff;} 100% {width: 0%;} }
        @keyframes showTitle { 0%, 80% {opacity: 0;} 100% {opacity: 1; transform: scale(1.2);} }
    </style>
</head>
<body>

    <div class="scene">
        <div class="duel-box">
            <div id="harry" class="char">🧙‍♂️</div>
            <div id="voldy" class="char">🦹‍♂️</div>
            <div class="beam"></div>
            <div id="voldy-dust" class="dust">💨</div>
            
            <div class="title">
                HARRY POTTER AND THE <br> DEATHLY HALLOWS - PART 2
            </div>
        </div>
    </div>

    <script>
        // Voldemort disappears after 5 seconds
        setTimeout(() => {
            document.getElementById('voldy').style.display = 'none';
            document.getElementById('voldy-dust').style.opacity = '1';
        }, 5000);
    </script>
</body>
</html>

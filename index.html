<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hermione's Magic Spell</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            background: radial-gradient(circle, #0d001a, #000);
            color: #fff;
            font-family: 'Georgia', serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            overflow: hidden;
        }

        h1 {
            color: #ffd700;
            font-size: 20px;
            margin-bottom: 25px;
            letter-spacing: 2px;
            text-shadow: 0 0 10px rgba(255, 215, 0, 0.5);
        }

        /* 10-Second Video Container */
        .video-screen {
            width: 320px;
            height: 400px;
            background: #110022;
            border: 4px solid #ffd700;
            border-radius: 20px;
            box-shadow: 0 0 30px rgba(0, 191, 255, 0.4);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            position: relative;
            overflow: hidden;
        }

        /* Hermione's Magic Wand */
        .wand {
            font-size: 50px;
            transform: rotate(-45deg);
            animation: waveWand 2s ease-in-out infinite;
            position: relative;
            z-index: 2;
        }

        /* Magical Light from Wand */
        .magic-glow {
            position: absolute;
            width: 10px;
            height: 10px;
            background: #00bfff;
            border-radius: 50%;
            top: 35%;
            box-shadow: 0 0 40px 30px rgba(0, 191, 255, 0.8), 0 0 80px 50px rgba(255, 255, 255, 0.6);
            animation: emitMagic 4s ease-in-out infinite;
            z-index: 1;
        }

        /* Hermione's Name Tag */
        .caster {
            font-size: 14px;
            color: #aaa;
            font-style: italic;
            margin-top: 15px;
        }

        /* Spell Text Animation */
        .spell-text {
            font-size: 24px;
            font-weight: bold;
            color: #00bfff;
            text-shadow: 0 0 20px #00bfff, 0 0 10px #fff;
            margin-top: 30px;
            letter-spacing: 1px;
            animation: spellCast 4s linear infinite;
            text-align: center;
            min-height: 40px;
        }

        /* Progress Loop bar */
        .timeline {
            width: 80%;
            height: 4px;
            background: #222;
            border-radius: 2px;
            margin-top: 40px;
            overflow: hidden;
        }

        .timeline-fill {
            height: 100%;
            background: #00bfff;
            width: 0%;
            animation: loopTime 4s linear infinite;
        }

        /* Animations */
        @keyframes waveWand {
            0%, 100% { transform: rotate(-45deg) translate(0, 0); }
            50% { transform: rotate(-30deg) translate(5px, -10px); }
        }

        @keyframes emitMagic {
            0%, 100% { transform: scale(0.5); opacity: 0.3; }
            50% { transform: scale(1.5); opacity: 1; }
        }

        @keyframes spellCast {
            0%, 20%, 100% { opacity: 0; transform: scale(0.8); content: ""; }
            40%, 80% { opacity: 1; transform: scale(1.1); }
        }

        @keyframes loopTime {
            0% { width: 0%; }
            100% { width: 100%; }
        }
    </style>
</head>
<body>

    <h1>✨ HERMIONE'S SPELL VIDEO ✨</h1>

    <div class="video-screen">
        <!-- Hermione's Wand & Magic Glow -->
        <div class="wand">🪄</div>
        <div class="magic-glow"></div>
        
        <div class="caster">Hermione Granger casts...</div>
        
        <!-- The Main Spell Text -->
        <div class="spell-text">⚡ EXPECTO PATRONUM!</div>

        <!-- 10s Video Style Progress Bar -->
        <div class="timeline">
            <div class="timeline-fill"></div>
        </div>
    </div>

</body>
</html>

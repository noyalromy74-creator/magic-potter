<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Harry Potter vs Voldemort - The Final Duel</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            background: radial-gradient(circle, #0f001a, #000);
            color: #fff;
            font-family: 'Georgia', serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            overflow: hidden;
        }

        /* 10-Second Video Container Box */
        .video-box {
            width: 350px;
            height: 520px;
            border: 4px solid #ffd700;
            border-radius: 20px;
            box-shadow: 0 0 35px rgba(0, 191, 255, 0.5);
            background: #05000a;
            position: relative;
            overflow: hidden;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding-top: 15px;
        }

        /* Image Wrapper */
        .image-container {
            width: 90%;
            height: 70%;
            border-radius: 10px;
            overflow: hidden;
            box-shadow: 0 0 15px rgba(255, 255, 255, 0.1);
        }

        /* The Duel Image */
        .duel-img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        /* Movie Title Styling */
        .movie-title {
            width: 90%;
            text-align: center;
            font-size: 16px;
            font-weight: bold;
            color: #ffd700;
            text-shadow: 0 0 10px rgba(255, 215, 0, 0.6);
            line-height: 1.5;
            margin-top: 20px;
            letter-spacing: 1px;
        }

        /* Progress Loop Timeline Bar */
        .timeline-bar {
            width: 85%;
            height: 4px;
            background: #222;
            border-radius: 2px;
            position: absolute;
            bottom: 20px;
            overflow: hidden;
        }

        .timeline-fill {
            height: 100%;
            background: #00bfff;
            width: 0%;
            animation: progressRun 4s linear infinite;
        }

        @keyframes progressRun {
            0% { width: 0%; }
            100% { width: 100%; }
        }
    </style>
</head>
<body>

    <div class="video-box">
        <!-- The Final Battle Image Box -->
        <div class="image-container">
            <img class="duel-img" src="https://i.ibb.co/v6p0YQzW/harry-vs-voldy.png" alt="Harry Potter vs Voldemort">
        </div>

        <!-- Only the Unique Title Text you wanted -->
        <div class="movie-title">
            HARRY POTTER <br>and the<br>DEATHLY HALLOWS - PART 2
        </div>

        <!-- Timeline Loader -->
        <div class="timeline-bar">
            <div class="timeline-fill"></div>
        </div>
    </div>

</body>
</html>

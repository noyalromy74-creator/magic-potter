<!DOCTYPE html>
<html>
<head>
    <style>
        body { margin: 0; background: #000; display: flex; justify-content: center; align-items: center; height: 100vh; }
        .box { width: 90%; max-width: 400px; border: 4px solid #ffd700; border-radius: 20px; overflow: hidden; }
        img { width: 100%; display: block; animation: move 5s infinite alternate ease-in-out; }
        @keyframes move {
            from { transform: scale(1); }
            to { transform: scale(1.1); }
        }
    </style>
</head>
<body>
    <div class="box">
        <img src="battle.png" alt="Harry Potter">
    </div>
</body>
</html>

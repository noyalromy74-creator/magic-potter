<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hermione Granger Magic Spell</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            background: radial-gradient(circle, #0f001a, #000);
            color: #fff;
            font-family: 'Georgia', serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            overflow: hidden;
        }

        h1 {
            color: #ffd700;
            font-size: 18px;
            margin-bottom: 20px;
            letter-spacing: 2px;
            text-shadow: 0 0 10px rgba(255, 215, 0, 0.5);
        }

        /* 10-Second Video Container */
        .video-container {
            width: 320px;
            height: 440px;
            background: #130122;
            border: 4px solid #ffd700;
            border-radius: 20px;
            box-shadow: 0 0 35px rgba(0, 191, 255, 0.4);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: flex-start;
            padding: 20px;
            box-sizing: border-box;
            position: relative;
            overflow: hidden;
        }

        /* Hermione Character (Using Stylized Avatar/Emoji Design) */
        .hermione-avatar {
            font-size: 80px;
            margin-top: 20px;
            position: relative;
            z-index: 2;
        }

        /* The Magic Wand */
        .wand {
            font-size: 45px;
            position: absolute;
            right: -15px;
            bottom: 10px;
            transform-origin: bottom left;
            animation: pointWand 4s ease-in-out infinite;
        }

        /* Magical Light Burst from the Wand */
        .wand-spark {
            position: absolute;
            width: 8px;
            height: 8px;
            background: #fff;
            border-radius: 50%;
            right: -25px;
            top: 5px;
            box-shadow: 0 0 30px 20px rgba(0, 191, 255, 0.9), 0 0 60px 40px rgba(255, 255, 255, 0.5);
            opacity: 0;
            animation: magicBurst 4s ease-in-out infinite;
            z-index: 1;
        }

        /* Hermione's Name Tag */
        .character-name {
            font-size: 14px;
            color: #ffd700;
            margin-top: 15px;
            font-weight: bold;
            letter-spacing: 1px;
        }

        /* Expecto Patronum Spell Text Animation */
        .spell-cast-text {
            font-size: 24px;
            font-weight: bold;
            color: #00bfff;
            text-shadow: 0 0 25px #00bfff, 0 0 10px #fff;
            margin-top: 40px;
            letter-spacing: 1.5px;
            text-align: center;
            opacity: 0;
            animation: textAppear 4s ease-in-out infinite;
        }

        /* Video Progress Loader */
        .video-timeline {
            width: 85%;
            height: 5px;
            background: #222;
            border-radius: 3px;
            position: absolute;
            bottom: 25px;
            overflow: hidden;
        }

        .timeline-fill-bar {
            height: 100%;
            background: #00bfff;
            width: 0%;
            animation: videoLoader 4s linear infinite;
        }

        /* --- MAGIC ANIMATIONS --- */
        
        /* 1. Wand Pointing Action (Neட்டுவது) */
        @keyframes pointWand {
            0%, 20%, 100% { transform: rotate(0deg); } /* Normal Position */
            40%, 80% { transform: rotate(-35deg) translate(5px, -5px); } /* Pointing forward */
        }

        /* 2. Magic Light Burst from Wand Tip */
        @keyframes magicBurst {
            0%, 35%, 100% { opacity: 0; transform: scale(0.5); }
            45%, 75% { opacity: 1; transform: scale(1.2); }
        }

        /* 3. Spell Text Appearance right after pointing */
        @keyframes textAppear {
            0%, 40%, 100% { opacity: 0; transform: scale(0.9); }
            50%, 80% { opacity: 1; transform: scale(1.1); }
        }

        /* 4. 10-Second Continuous Loop Video Bar */
        @keyframes videoLoader {
            0% { width: 0%; }
            100% { width: 100%; }
        }
    </style>
</head>
<body>

    <h1>🎬 HERMIONE'S SPELL SCENE</h1>

    <div class="video-container">
        <!-- Hermione Character with Wand -->
        <div class="hermione-avatar">
            👩🏽‍🦱
            <div class="wand" id="hermione-wand">🪄</div>
            <div class="wand-spark"></div>
        </div>
        
        <div class="character-name">Hermione Granger</div>
        
        <!-- The Magical Text that triggers after wand points -->
        <div class="spell-cast-text">⚡ EXPECTO PATRONUM!</div>

        <!-- Video Style Progress Bar at the bottom -->
        <div class="video-timeline">
            <div class="timeline-fill-bar"></div>
        </div>
    </div>

</body>
</html>
